version: '3.9'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: shopping-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shopping
      POSTGRES_PASSWORD: shopping_dev
      POSTGRES_DB: shopping_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U shopping -d shopping_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
